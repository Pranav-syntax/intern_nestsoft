{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h1>Delete Car</h1>
    <p>Are you sure you want to delete <strong>{{ car }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Confirm Delete</button>
        <a href="{% url 'car_list' %}">Cancel</a>
    </form>
</div>
{% endblock %}
